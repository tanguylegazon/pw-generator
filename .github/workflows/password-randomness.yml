name: Password randomness tests

on:
  push:
    branches:
      - main
    paths:
      - password.js
      - script.js
      - tests/**
      - .github/workflows/password-randomness.yml
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      generator: ${{ steps.filter.outputs.generator }}
      policy: ${{ steps.filter.outputs.policy }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect changed files
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            generator:
              - 'password.js'
              - 'tests/password.generator-randomness.test.cjs'
              - '.github/workflows/password-randomness.yml'
            policy:
              - 'script.js'
              - 'tests/password.policy-randomness.test.cjs'
              - '.github/workflows/password-randomness.yml'

  generator-randomness:
    needs: changes
    if: ${{ needs.changes.outputs.generator == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run generator statistical randomness test
        run: node tests/password.generator-randomness.test.cjs

  policy-randomness:
    needs: changes
    if: ${{ needs.changes.outputs.policy == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run policy statistical randomness test
        run: node tests/password.policy-randomness.test.cjs
