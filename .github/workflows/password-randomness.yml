name: Password randomness tests

on:
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  randomness:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run low-level statistical randomness test
        run: node tests/randomness.test.cjs

      - name: Run UI statistical randomness test
        run: node tests/randomness-ui.test.cjs
